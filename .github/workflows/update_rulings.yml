name: Update rulings
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python update_site.py
      - name: Commit indien gewijzigd
        run: |
          if [ -n "$(git status --porcelain site_data.json)" ]; then
            git config user.name "rulings-bot"
            git config user.email "bot@users.noreply.github.com"
            git add site_data.json
            git commit -m "Auto-update beslissingen $(date -u +%F)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Geen nieuwe beslissingen."
          fi
