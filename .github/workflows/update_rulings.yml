name: Update rulings
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python update_site.py
      - name: Commit indien gewijzigd
        run: |
          if [ -z "$(git status --porcelain site_data.json)" ]; then
            echo "Geen nieuwe beslissingen."; exit 0
          fi
          git config user.name "rulings-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site_data.json
          git commit -m "Auto-update beslissingen $(date -u +%F)"
          for n in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push; then echo "Gepusht."; exit 0; fi
            echo "Push mislukt, opnieuw ($n) ..."; sleep 5
          done
          echo "Push bleef mislukken."; exit 1
